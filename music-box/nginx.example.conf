# 把这段改好域名后放到 /etc/nginx/sites-available/music-box·再 ln -s 到 sites-enabled
# HTTPS 证书用 certbot 一键申请：sudo certbot --nginx -d music.你的域名.com
#
# 注意：网易云返回的 mp3 直链是 http 的·浏览器在 https 页面里会拦"混合内容"。
# 本配置让前端始终走 /api/song/url 拿链接·真正的音频请求由浏览器直接发往网易云CDN，
# 现代浏览器对 <audio> 的 http 源通常放行；若个别歌被拦·见 README"混合内容"一节。

server {
    listen 80;
    server_name music.你的域名.com;
    # certbot 会自动加 80→443 跳转

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # MCP 是流式响应·关掉缓冲
        proxy_buffering off;
        proxy_read_timeout 300s;
    }
}
